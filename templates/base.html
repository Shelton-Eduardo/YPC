<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHED - {{ titulo }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-800 min-h-screen flex flex-col font-sans">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <span class="text-xl font-black tracking-tighter text-blue-600">SHED</span>
            <h1 class="text-sm font-medium text-slate-400 uppercase tracking-widest">{{ titulo }}</h1>
        </div>
    </header>

    <main class="flex-grow p-5 max-w-md mx-auto w-full pb-24">
        {% block content %}{% endblock %}
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-3 pb-6 z-50">
        <div class="flex justify-around max-w-md mx-auto">
            <a href="/" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[10px] font-bold">Início</span>
            </a>
            <a href="/favoritos" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <span class="text-[10px] font-bold">Favoritos</span>
            </a>
            <a href="/cesto" class="flex flex-col items-center gap-1 text-slate-400 hover:text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[10px] font-bold">Cesto</span>
            </a>
        </div>
    </nav>
</body>
</html>
